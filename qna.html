<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&A 자동응답 | 한국장미회</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header"></div>

  <section class="hero page-hero">
    <div class="container">
      <h1>무엇이든 물어보세요</h1>
      <p>가입·회비·모임·장미 관리 등 한국장미회에 대한 질문에 자동으로 답해드립니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="container qna-wrap">
      <div class="chat-box" id="chat-box"></div>

      <form class="chat-form" id="chat-form">
        <input type="text" id="chat-input" placeholder="예) 회원이 되려면 어떻게 하나요?" autocomplete="off">
        <button type="submit" class="chat-send">질문</button>
      </form>

      <p style="color:var(--gray);font-size:14px;margin-top:18px;">자주 묻는 질문</p>
      <div class="chip-row" id="chat-chips"></div>

      <p class="form-note" style="margin-top:24px;">
        ※ 자동응답은 자주 묻는 질문을 바탕으로 안내합니다. 더 자세한 사항은
        <a href="about.html">협회 소개</a> 또는 사무국 문의를 이용해 주세요.
      </p>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script src="js/qna.js"></script>
</body>
</html>
