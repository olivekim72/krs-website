<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 스토리 | 한국장미회</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header"></div>

  <section class="hero page-hero">
    <div class="container">
      <h1>회원 스토리</h1>
      <p>내 장미, 내 정원, 그리고 함께한 순간 — 사진과 글로 자유롭게 나눠요.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <div class="board-head">
        <div>
          <h2>회원들의 장미 이야기</h2>
          <p>로그인하면 누구나 사진과 글을 간편하게 올릴 수 있어요.</p>
        </div>
        <button id="new-story-btn" class="btn btn-primary" style="background:var(--rose-deep);color:#fff;border:none;cursor:pointer;">✏️ 스토리 올리기</button>
      </div>

      <!-- 로그인 안내 -->
      <div id="auth-notice"></div>

      <!-- 업로드 폼 (기본 숨김) -->
      <form id="story-form" class="form-wrap" style="display:none;">
        <div class="field">
          <label>제목 *</label>
          <input type="text" name="title" required placeholder="예) 올봄 우리 집 첫 장미가 피었어요">
        </div>
        <div class="form-row">
          <div class="field">
            <label>카테고리</label>
            <select name="category"></select>
          </div>
        </div>
        <div class="field">
          <label>내용 *</label>
          <textarea name="content" required placeholder="장미를 가꾸며 있었던 이야기를 자유롭게 들려주세요."></textarea>
        </div>
        <div class="field">
          <label>사진 (선택)</label>
          <input type="file" name="image" accept="image/*" style="display:none;" id="story-image-input">
          <label for="story-image-input" class="image-drop image-preview">📷 사진을 선택하세요 (클릭)</label>
        </div>
        <div style="display:flex; gap:12px;">
          <button type="submit" class="btn btn-primary" style="background:var(--rose-deep);color:#fff;border:none;cursor:pointer;flex:1;">스토리 올리기</button>
          <button type="button" class="cancel-btn">취소</button>
        </div>
      </form>

      <div id="story-status"></div>

      <!-- 스토리 목록 -->
      <div class="event-grid" id="story-board"></div>

    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/stories.js"></script>
</body>
</html>
